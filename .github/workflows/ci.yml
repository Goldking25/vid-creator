name: CI - Build, Test & Package

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

      - name: Verify imports
        run: python -c "import config; import models.trending; import fetchers.youtube_fetcher; import processors.content_processor; import processors.prompt_builder; import generators.video_generator; import generators.output_manager; print('All imports OK')"

  package:
    needs: test
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build zipapp (.pyz)
        run: |
          mkdir -p build/app
          cp -r main.py config.py __main__.py build/app/
          cp -r models fetchers processors generators build/app/
          python -m zipapp build/app -o dist/vid-creator.pyz -p "/usr/bin/env python3"
          mkdir -p dist

      - name: Upload .pyz to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/vid-creator.pyz
